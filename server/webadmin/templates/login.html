<!DOCTYPE html>
<html lang="hu" class="h-full bg-slate-950">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ settings.app_name }} - Bejelentkezés</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: "{{ settings.primary_color or '#2563eb' }}",
                        branddark: "{{ settings.secondary_color or '#1e293b' }}"
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-full bg-gradient-to-br from-branddark via-slate-900 to-slate-950">
    <div class="flex min-h-screen items-center justify-center px-4 py-10">
        <div class="w-full max-w-md overflow-hidden rounded-3xl border border-white/10 bg-white shadow-2xl">
            <div class="px-8 pt-8 text-center">
                {% if settings.login_logo_path %}
                <img src="{{ settings.login_logo_path }}" alt="Logo" class="mx-auto mb-5 max-h-24 w-auto">
                {% elif settings.app_icon_path %}
                <img src="{{ settings.app_icon_path }}" alt="App icon" class="mx-auto mb-5 max-h-20 w-auto">
                {% endif %}

                <h1 class="text-3xl font-bold tracking-tight text-slate-900">{{ settings.app_name }}</h1>
                <p class="mt-2 text-sm text-slate-500">{{ settings.company_name or 'Web Admin bejelentkezés' }}</p>
            </div>

            <div class="px-8 pb-8 pt-6">
                {% if error %}
                <div class="mb-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
                    {{ error }}
                </div>
                {% endif %}

                <form method="post" action="/webadmin/login" class="space-y-4">
                    <div>
                        <label for="username"
                            class="mb-2 block text-sm font-medium text-slate-700">Felhasználónév</label>
                        <input id="username" name="username" type="text" required
                            class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-0 transition focus:border-brand">
                    </div>

                    <div>
                        <label for="password" class="mb-2 block text-sm font-medium text-slate-700">Jelszó</label>
                        <input id="password" name="password" type="password" required
                            class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none ring-0 transition focus:border-brand">
                    </div>

                    <button type="submit"
                        class="w-full rounded-2xl bg-brand px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:opacity-95">
                        Belépés
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
