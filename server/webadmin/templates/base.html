<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ settings.app_name }} - Web Admin</title>
    <style>
        :root {
            --primary: {{ settings.primary_color or '#2563eb' }};
            --secondary: {{ settings.secondary_color or '#1e293b' }};
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #dbe3ee;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--secondary);
            color: white;
            padding: 24px 18px;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .company {
            color: rgba(255,255,255,0.75);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .nav a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
        }

        .nav a:hover {
            background: rgba(255,255,255,0.12);
        }

        .main {
            padding: 28px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
        }

        .page-subtitle {
            color: var(--muted);
            margin-top: 6px;
        }

        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: #e0f2fe;
            color: #075985;
            font-size: 13px;
            font-weight: 600;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
            margin-bottom: 18px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="color"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: white;
            font-size: 14px;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.94;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            font-size: 14px;
        }

        th {
            color: var(--muted);
            font-weight: 600;
        }

        .status-online { color: var(--success); font-weight: 700; }
        .status-offline { color: var(--danger); font-weight: 700; }

        .small { font-size: 12px; color: var(--muted); }

        .checks {
            display: grid;
            grid-template-columns: repeat(2, minmax(160px, 1fr));
            gap: 8px 16px;
        }

        .checks label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">{{ settings.app_name }}</div>
        <div class="company">{{ settings.company_name or 'Nincs megadva cég' }}</div>

        <nav class="nav">
            <a href="/webadmin/">Dashboard</a>
            <a href="/webadmin/devices">Eszközök</a>
            <a href="/webadmin/users">Admin felhasználók</a>
            <a href="/webadmin/settings">Beállítások</a>
            <a href="/webadmin/logout">Kilépés</a>
        </nav>
    </aside>

    <main class="main">
        <div class="page-header">
            <div>
                <div class="page-title">{% block page_title %}{% endblock %}</div>
                <div class="page-subtitle">{% block page_subtitle %}{% endblock %}</div>
            </div>
            <div class="badge">
                Belépve: {{ current_user.username }}
            </div>
        </div>

        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
